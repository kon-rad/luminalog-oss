<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LuminaLog — iOS Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet" />
<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body { font-family: -apple-system, "SF Pro Text", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  button { font: inherit; }

  /* hide scrollbars inside the phone, keep scrollable */
  .ll-scroll { scrollbar-width: none; -ms-overflow-style: none; }
  .ll-scroll::-webkit-scrollbar { width: 0; height: 0; display: none; }

  @keyframes ll-spin { to { transform: rotate(360deg); } }
  @keyframes ll-shimmer { 0% { opacity: 1; } 50% { opacity: 0.45; } 100% { opacity: 1; } }
  .ll-shimmer { animation: ll-shimmer 1.4s ease-in-out infinite; }
  @keyframes ll-rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes ll-pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.06); opacity: 0.82; } }
  @keyframes ll-wave { 0%,100% { transform: scaleY(0.4); } 50% { transform: scaleY(1); } }
  @keyframes ll-dot { 0%,100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(-4px); opacity: 1; } }
  @keyframes ll-ring { 0% { transform: scale(0.62); opacity: 0.5; } 100% { transform: scale(1.05); opacity: 0; } }
  @keyframes ll-orb-breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  @keyframes ll-orb-speak { 0%,100% { transform: scale(1); } 25% { transform: scale(1.09); } 60% { transform: scale(1.03); } }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="frames/ios-frame.jsx"></script>
  <script type="text/babel" src="core.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="nav.jsx"></script>
  <script type="text/babel" src="screen-home.jsx"></script>
  <script type="text/babel" src="screen-list.jsx"></script>
  <script type="text/babel" src="screen-detail.jsx"></script>
  <script type="text/babel" src="screen-create.jsx"></script>
  <script type="text/babel" src="screen-chats.jsx"></script>
  <script type="text/babel" src="screen-chat.jsx"></script>
  <script type="text/babel" src="screen-voice.jsx"></script>
  <script type="text/babel" src="screen-profile.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
