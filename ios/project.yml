name: LuminaLog

options:
  bundleIdPrefix: com.konradgnat
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "8"
    DEVELOPMENT_TEAM: "GA978N825M"
    CODE_SIGN_STYLE: Automatic

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: 5.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0
  Vapi:
    url: https://github.com/VapiAI/ios
    branch: main
  # On-device embedding stack (increment 1c-D): ONNX Runtime runs the
  # EmbeddingGemma model; swift-transformers provides the SentencePiece tokenizer.
  onnxruntime:
    url: https://github.com/microsoft/onnxruntime-swift-package-manager
    from: 1.16.0
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: 0.1.0

targets:
  LuminaLog:
    type: application
    platform: iOS
    # Local-only secrets/per-project values (e.g. GOOGLE_REVERSED_CLIENT_ID).
    # Copy Local.xcconfig.example -> Local.xcconfig and fill it in. The real
    # file is gitignored so per-project ids stay out of this open-source repo.
    configFiles:
      Debug: LuminaLog/Local.xcconfig
      Release: LuminaLog/Local.xcconfig
    sources:
      - path: LuminaLog
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: Vapi
        product: Vapi
      - package: onnxruntime
        product: onnxruntime
      - package: swift-transformers
        product: Transformers
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.konradgnat.luminalog
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # GOOGLE_REVERSED_CLIENT_ID is supplied by Local.xcconfig (gitignored),
        # not here — an explicit value in the project file would override the
        # xcconfig. See README "Enabling Google Sign-In".
    entitlements:
      path: LuminaLog/Resources/LuminaLog.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    info:
      path: LuminaLog/Resources/Info.plist
      properties:
        CFBundleDisplayName: LuminaLog
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Keeps the VAPI voice call's mic + audio alive when the screen locks
        # or the app backgrounds (paired with isIdleTimerDisabled while active).
        UIBackgroundModes:
          - audio
        NSMicrophoneUsageDescription: "LuminaLog uses the microphone so you can record voice journal entries and dictate your thoughts."
        NSSpeechRecognitionUsageDescription: "LuminaLog transcribes your voice recordings — on-device when your device supports it — so your spoken reflections become searchable journal text."
        NSCameraUsageDescription: "LuminaLog uses the camera so you can capture photos and videos as part of your journal entries."
        NSPhotoLibraryUsageDescription: "LuminaLog accesses your photo library so you can attach photos and videos to your journal entries."
        NSPhotoLibraryAddUsageDescription: "LuminaLog can save photos and videos from your journal entries back to your photo library."
        # Lets canOpenURL detect whether each social app is installed so the
        # report-card share bar can deep-link into the app instead of the website.
        LSApplicationQueriesSchemes:
          - instagram
          - twitter
          - linkedin
          - fb
        ITSAppUsesNonExemptEncryption: false
        LUMINALOG_API_URL: "https://api.luminalog.com"
        GitCommitHash: "unknown"
        REVENUECAT_API_KEY: $(REVENUECAT_API_KEY)
        # On-device embedding model download (increment 1c-D):
        # distiluse-base-multilingual-cased-v2, 512-dim, fp16 (~258 MB) — the full
        # sentence-transformers pipeline (transformer → mean-pool → Dense) baked into
        # one ONNX. WordPiece tokenizer (works with swift-transformers, unlike the
        # SentencePiece MiniLM we tried first). Tokenizer ships as two plain files
        # (tokenizer.json + tokenizer_config.json), NOT a zip. Six keys total (3
        # URL/SHA-256 pairs). SHA-256 is verified on download; a model swap = new
        # versioned path + new hashes + bumped `model:` id in AppServices.
        EMBEDDING_MODEL_URL: "https://luminalog-models.s3.us-east-1.amazonaws.com/distiluse-multilingual/v1/distiluse-multilingual.onnx"
        EMBEDDING_MODEL_SHA256: "ef4f58f1eb478e3097c3b4f197c97390ae4decaedc363defbb937a4c8eb41e6f"
        EMBEDDING_TOKENIZER_URL: "https://luminalog-models.s3.us-east-1.amazonaws.com/distiluse-multilingual/v1/tokenizer.json"
        EMBEDDING_TOKENIZER_SHA256: "3564bb27a5b787b8ce0e415d4961a19c682d6fc70c3dc92341d9c699e11d37f6"
        EMBEDDING_TOKENIZER_CONFIG_URL: "https://luminalog-models.s3.us-east-1.amazonaws.com/distiluse-multilingual/v1/tokenizer_config.json"
        EMBEDDING_TOKENIZER_CONFIG_SHA256: "84e36de990575ab69acf45c7537a1bb7f1bd6ecba95ab4d5ba8bf64ccc24b2c8"
        # Google Sign-In redirect scheme. Resolves to the GOOGLE_REVERSED_CLIENT_ID
        # build setting above — empty (inert) until configured per the README.
        CFBundleURLTypes:
          - CFBundleURLName: GoogleSignIn
            CFBundleURLSchemes:
              - $(GOOGLE_REVERSED_CLIENT_ID)

    preBuildScripts:
      - name: "Embed Git Commit Hash"
        script: |
          SHA=$(git -C "${SRCROOT}" rev-parse --short HEAD 2>/dev/null || echo "unknown")
          /usr/libexec/PlistBuddy -c "Set :GitCommitHash $SHA" "${PRODUCT_SETTINGS_PATH}" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :GitCommitHash string $SHA" "${PRODUCT_SETTINGS_PATH}"
        shell: /bin/bash
        showEnvVars: false

  LuminaLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LuminaLogTests
    dependencies:
      - target: LuminaLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.konradgnat.luminalog.tests
        GENERATE_INFOPLIST_FILE: true

schemes:
  LuminaLog:
    build:
      targets:
        LuminaLog: all
    run:
      config: Debug
    test:
      targets:
        - LuminaLogTests
    archive:
      config: Release
