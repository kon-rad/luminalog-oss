name: LuminaLog

options:
  bundleIdPrefix: com.luminalog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: 5.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0

targets:
  LuminaLog:
    type: application
    platform: iOS
    sources:
      - path: LuminaLog
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: RevenueCat
        product: RevenueCat
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.luminalog.app
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: false
    info:
      path: LuminaLog/Resources/Info.plist
      properties:
        CFBundleDisplayName: LuminaLog
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "LuminaLog uses the microphone so you can record voice journal entries and dictate your thoughts."
        NSSpeechRecognitionUsageDescription: "LuminaLog transcribes your voice recordings on-device so your spoken reflections become searchable journal text."
        NSCameraUsageDescription: "LuminaLog uses the camera so you can capture photos and videos as part of your journal entries."
        NSPhotoLibraryUsageDescription: "LuminaLog accesses your photo library so you can attach photos and videos to your journal entries."
        NSPhotoLibraryAddUsageDescription: "LuminaLog can save photos and videos from your journal entries back to your photo library."
        ITSAppUsesNonExemptEncryption: false
        LUMINALOG_API_URL: "http://localhost:3200"

  LuminaLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LuminaLogTests
    dependencies:
      - target: LuminaLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.luminalog.app.tests
        GENERATE_INFOPLIST_FILE: true

schemes:
  LuminaLog:
    build:
      targets:
        LuminaLog: all
    run:
      config: Debug
    test:
      targets:
        - LuminaLogTests
    archive:
      config: Release
